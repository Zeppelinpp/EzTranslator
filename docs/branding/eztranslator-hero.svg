<svg width="1440" height="620" viewBox="0 0 1440 620" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EzTranslator hero banner</title>
  <desc id="desc">A clean product banner for EzTranslator showing a compact floating translation popup and a flow-first interface.</desc>
  <defs>
    <linearGradient id="pageBg" x1="118" y1="84" x2="1168" y2="688" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EFF7FF"/>
      <stop offset="0.5" stop-color="#F8FCFF"/>
      <stop offset="1" stop-color="#EEFFF7"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563EB"/>
      <stop offset="0.5" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="softCard" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F7FBFF"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 210) rotate(31) scale(320 260)">
      <stop stop-color="#93C5FD" stop-opacity="0.48"/>
      <stop offset="1" stop-color="#93C5FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1044 568) rotate(149) scale(356 286)">
      <stop stop-color="#6EE7B7" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#6EE7B7" stop-opacity="0"/>
    </radialGradient>
    <filter id="panelShadow" x="28" y="34" width="1384" height="564" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <filter id="popupShadow" x="856" y="186" width="430" height="288" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1440" height="620" rx="40" fill="url(#pageBg)"/>
  <rect width="1440" height="620" rx="40" fill="url(#glowA)"/>
  <rect width="1440" height="620" rx="40" fill="url(#glowB)"/>

  <g filter="url(#panelShadow)">
    <rect x="52" y="56" width="1336" height="508" rx="34" fill="#FFFFFF" fill-opacity="0.95"/>
    <rect x="52.75" y="56.75" width="1334.5" height="506.5" rx="33.25" stroke="#D9E8F8" stroke-width="1.5"/>
  </g>

  <rect x="94" y="96" width="72" height="72" rx="22" fill="url(#brand)"/>
  <rect x="108" y="110" width="38" height="26" rx="10" fill="#FFFFFF" fill-opacity="0.98"/>
  <path d="M123 136L117 147L129 138" fill="#FFFFFF" fill-opacity="0.98"/>
  <path d="M117 120H136" stroke="#0F172A" stroke-width="3.8" stroke-linecap="round" stroke-opacity="0.85"/>
  <path d="M117 129H130" stroke="#0F172A" stroke-width="3.8" stroke-linecap="round" stroke-opacity="0.54"/>
  <rect x="135" y="131" width="19" height="16" rx="6" fill="#0F172A" fill-opacity="0.94"/>
  <path d="M141.5 135L139 143" stroke="#F8FAFC" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M148 135L150.5 143" stroke="#F8FAFC" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M139.5 140.5H150.5" stroke="#F8FAFC" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M145 133V145" stroke="#34D399" stroke-width="1.9" stroke-linecap="round"/>

  <text x="186" y="144" font-size="42" font-weight="800" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" letter-spacing="-1.2" fill="#0F172A">EzTranslator</text>

  <text x="94" y="232" font-size="60" font-weight="820" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" letter-spacing="-2.1" fill="#0F172A">Translate without leaving your flow.</text>
  <text x="94" y="278" font-size="24" font-weight="560" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#475569">Hold Right Option to see a compact translation popup exactly where you are working.</text>

  <rect x="94" y="314" width="164" height="44" rx="22" fill="#0F172A"/>
  <text x="176" y="342" text-anchor="middle" font-size="17" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#F8FAFC">Flow-first</text>
  <rect x="272" y="314" width="196" height="44" rx="22" fill="#DBEAFE"/>
  <text x="370" y="342" text-anchor="middle" font-size="17" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#1D4ED8">Hover word translation</text>
  <rect x="482" y="314" width="186" height="44" rx="22" fill="#DCFCE7"/>
  <text x="575" y="342" text-anchor="middle" font-size="17" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#047857">Local or BYOK</text>

  <rect x="94" y="404" width="612" height="122" rx="28" fill="#F8FBFF"/>
  <rect x="94.75" y="404.75" width="610.5" height="120.5" rx="27.25" stroke="#D9E8F8" stroke-width="1.5"/>
  <text x="126" y="447" font-size="22" font-weight="760" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" fill="#0F172A">Why it feels fast</text>
  <text x="126" y="486" font-size="18" font-weight="560" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#334155">Compact popup near cursor  ·  No selection required for single words  ·  Selected text with the same shortcut</text>

  <rect x="872" y="120" width="434" height="292" rx="30" fill="#F8FBFF"/>
  <rect x="872.75" y="120.75" width="432.5" height="290.5" rx="29.25" stroke="#D9E8F8" stroke-width="1.5"/>
  <text x="908" y="166" font-size="18" font-weight="700" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" fill="#0F172A">Source text</text>
  <text x="1172" y="166" font-size="16" font-weight="650" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#475569">hover a word</text>
  <rect x="908" y="192" width="252" height="16" rx="8" fill="#CBD5E1"/>
  <rect x="908" y="220" width="214" height="16" rx="8" fill="#CBD5E1"/>
  <rect x="908" y="248" width="282" height="16" rx="8" fill="#CBD5E1"/>
  <rect x="908" y="276" width="186" height="16" rx="8" fill="#93C5FD"/>
  <rect x="908" y="324" width="136" height="16" rx="8" fill="#E2E8F0"/>
  <rect x="908" y="352" width="222" height="16" rx="8" fill="#E2E8F0"/>

  <g filter="url(#popupShadow)">
    <rect x="902" y="214" width="338" height="214" rx="28" fill="url(#softCard)"/>
    <rect x="902.75" y="214.75" width="336.5" height="212.5" rx="27.25" stroke="#D9E8F8" stroke-width="1.5"/>
  </g>
  <text x="936" y="268" font-size="15" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#64748B">Original</text>
  <text x="936" y="305" font-size="31" font-weight="760" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" fill="#0F172A">cursor</text>
  <rect x="936" y="326" width="270" height="1" fill="#E2E8F0"/>
  <text x="936" y="362" font-size="15" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#64748B">Translation</text>
  <text x="936" y="400" font-size="31" font-weight="760" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" fill="#0F172A">光标</text>

  <rect x="1084" y="444" width="222" height="82" rx="24" fill="#F8FBFF"/>
  <rect x="1084.75" y="444.75" width="220.5" height="80.5" rx="23.25" stroke="#D9E8F8" stroke-width="1.5"/>
  <text x="1118" y="478" font-size="16" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#0F172A">Providers</text>
  <text x="1118" y="505" font-size="15" font-weight="560" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#475569">Ollama or OpenAI-compatible</text>
</svg>
