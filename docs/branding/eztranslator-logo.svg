<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EzTranslator logo</title>
  <desc id="desc">EzTranslator wordmark with a compact floating translation icon.</desc>
  <defs>
    <linearGradient id="brandGradient" x1="36" y1="24" x2="144" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bubbleGradient" x1="56" y1="46" x2="127" y2="122" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#E8F5FF"/>
    </linearGradient>
    <filter id="shadow" x="8" y="4" width="184" height="172" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="28" y="20" width="144" height="144" rx="36" fill="url(#brandGradient)"/>
  </g>
  <rect x="48" y="40" width="84" height="58" rx="22" fill="url(#bubbleGradient)" fill-opacity="0.96"/>
  <path d="M82 98L70 118L92 101" fill="url(#bubbleGradient)" fill-opacity="0.96"/>
  <path d="M69 58H111" stroke="#0F172A" stroke-width="7" stroke-linecap="round" stroke-opacity="0.88"/>
  <path d="M69 77H96" stroke="#0F172A" stroke-width="7" stroke-linecap="round" stroke-opacity="0.6"/>

  <g transform="translate(95 89)">
    <rect x="0" y="0" width="48" height="40" rx="14" fill="#0F172A" fill-opacity="0.88"/>
    <path d="M18 12L12 28" stroke="#F8FAFC" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M30 12L36 28" stroke="#F8FAFC" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M14 24H34" stroke="#F8FAFC" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M26 8V32" stroke="#34D399" stroke-width="3" stroke-linecap="round"/>
  </g>

  <g fill="#0F172A">
    <text x="208" y="86" font-size="54" font-weight="800" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" letter-spacing="-1.5">EzTranslator</text>
    <text x="210" y="122" font-size="20" font-weight="500" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#475569">Minimal floating translation for macOS</text>
  </g>
</svg>
