<svg width="860" height="220" viewBox="0 0 860 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">EzTranslator logo</title>
  <desc id="desc">EzTranslator wordmark on a clean rounded card with a compact translation icon.</desc>
  <defs>
    <linearGradient id="brand" x1="86" y1="48" x2="178" y2="172" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB"/>
      <stop offset="0.55" stop-color="#06B6D4"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="bubble" x1="96" y1="69" x2="157" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <filter id="shadow" x="8" y="10" width="844" height="204" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="24" y="26" width="812" height="168" rx="34" fill="#F8FBFF"/>
    <rect x="24.75" y="26.75" width="810.5" height="166.5" rx="33.25" stroke="#D9E8F8" stroke-width="1.5"/>
  </g>

  <rect x="68" y="48" width="112" height="112" rx="30" fill="url(#brand)"/>
  <rect x="89" y="69" width="60" height="41" rx="14" fill="url(#bubble)" fill-opacity="0.98"/>
  <path d="M112 109L103 125L120 112" fill="url(#bubble)" fill-opacity="0.98"/>
  <path d="M104 84H134" stroke="#0F172A" stroke-width="5.4" stroke-linecap="round" stroke-opacity="0.88"/>
  <path d="M104 98H124" stroke="#0F172A" stroke-width="5.4" stroke-linecap="round" stroke-opacity="0.56"/>
  <rect x="132" y="103" width="31" height="26" rx="9" fill="#0F172A" fill-opacity="0.92"/>
  <path d="M142 109L138 122" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M152 109L156 122" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M139 118H155" stroke="#F8FAFC" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M148 106V124" stroke="#34D399" stroke-width="2.4" stroke-linecap="round"/>

  <text x="216" y="102" font-size="64" font-weight="800" font-family="SF Pro Display, Inter, Segoe UI, sans-serif" letter-spacing="-2" fill="#0F172A">EzTranslator</text>
  <text x="220" y="142" font-size="23" font-weight="560" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#475569">Minimal floating translation for macOS</text>

  <rect x="612" y="76" width="168" height="38" rx="19" fill="#DBEAFE"/>
  <text x="696" y="101" text-anchor="middle" font-size="16" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#1D4ED8">Flow-first</text>
  <rect x="612" y="122" width="168" height="38" rx="19" fill="#DCFCE7"/>
  <text x="696" y="147" text-anchor="middle" font-size="16" font-weight="700" font-family="SF Pro Text, Inter, Segoe UI, sans-serif" fill="#047857">Hover to translate</text>
</svg>
